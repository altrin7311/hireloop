            - generic [ref=e998]: As Anthropic strives to create reliable, interpretable, and steerable AI systems, the need for skilled Analytics Engineers who can build scalable solutions to transform data into key metrics reporting and insights is crucial. With a strong foundation in computer science and experience in data analytics, I am excited about the opportunity to join the Data Science & Analytics team and contribute to the development of high-impact AI research. My experience in building and maintaining Power BI and Excel dashboards to monitor Supply Chain KPIs, as well as developing automated Python-based data pipelines, has prepared me to define, build, and manage key data pipelines in dbt. In my current role as a Data Analytics Intern at Landmark Group, I developed automated Python-based data pipelines to process and structure over 1 million operational records, improving reporting efficiency and data accuracy. I also created advanced DAX measures and KPI logic to ensure accurate performance tracking and standardized reporting across distribution centers. This experience has taught me the importance of establishing high data integrity standards and SLAs, and I am eager to apply this knowledge to establish similar standards at Anthropic. My proficiency in SQL, Python, and data analytics has allowed me to identify performance patterns, support predictive insights, and enhance supply chain reporting processes, skills that I believe will be valuable in this role. I am excited about the opportunity to join Anthropic and contribute to the company's mission to create reliable and interpretable AI systems. As a detail-oriented and results-driven individual with a bias for action and urgency, I am well-suited to thrive in an environment that values a full-stack mindset and a range of diverse perspectives. I look forward to discussing my application and how my skills and experience align with the requirements of the Analytics Engineer role. I am confident that my technical skills, combined with my experience in data analytics and my passion for AI research, make me an ideal candidate for this position, and I am excited to take the next step in the process.
